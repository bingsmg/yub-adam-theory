name: Daily Adam's Theory Update

on:
  schedule:
    # 16:00 CST = 08:00 UTC (A-share market closes at 15:00, allow 1h for data propagation)
    - cron: '0 8 * * 1-5'   # Every weekday at 16:00 Beijing time
  workflow_dispatch:          # Manual trigger
    inputs:
      limit:
        description: 'Max stocks to analyze for signals'
        required: false
        default: '500'
        type: string
      data_source:
        description: 'Primary data source'
        required: false
        default: 'akshare'
        type: choice
        options:
          - akshare
          - baostock
      skip_fetch:
        description: 'Skip data fetch, analyze from cache only'
        required: false
        default: false
        type: boolean

jobs:
  update-and-recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # Expose Feishu webhook at job level for step condition
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install efinance 2>/dev/null || true

      - name: Create .env configuration
        env:
          DATA_SOURCE: ${{ github.event.inputs.data_source || 'akshare' }}
          STOCK_LIMIT: ${{ github.event.inputs.limit || '500' }}
        run: |
          cat > .env << ENDENV
          # Generated by GitHub Actions on $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RESULTS_DIR=output/results
          REPORTS_DIR=output/reports
          DAILY_DIR=output/daily
          ALL_STOCKS_PATH=output/all_stocks.parquet
          STOCK_LIST_PATH=output/stock_list.csv

          DATA_SOURCE_ORDER=["${DATA_SOURCE}","baostock"]
          DATA_SOURCE_STRATEGY=priority

          FETCH_DELAY_SECONDS=1.0
          FETCH_MAX_WORKERS=8
          FETCH_RETRY_COUNT=3

          LOOKBACK_BARS=20
          BREAKOUT_LOOKBACK=20
          BREAKOUT_THRESHOLD_PCT=0.98
          TREND_CHANGE_LOOKBACK=40
          TREND_CHANGE_RECENT=15
          RANGE_EXPANSION_MULTIPLE=1.5
          GAP_MIN_PCT=0.5

          MIN_PRICE=3.0
          MAX_STOCKS_TO_ANALYZE=${STOCK_LIMIT}

          MAX_RISK_SCORE=7.0
          TOP_N_RECOMMENDATIONS=20

          FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
          ENDENV

      - name: Cache stock data
        id: cache-stock
        uses: actions/cache@v4
        with:
          path: output/daily/
          key: stock-data-v1-${{ github.run_id }}
          restore-keys: |
            stock-data-v1-

      - name: Run daily update
        env:
          SKIP_FETCH: ${{ github.event.inputs.skip_fetch || 'false' }}
          STOCK_LIMIT: ${{ github.event.inputs.limit || '500' }}
        run: |
          # Check if we have existing data
          if [ -d "output/daily" ] && [ "$(ls -A output/daily/*.parquet 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "[OK] Found cached parquet data"
            LAST_DATE=$(python -c "
          import glob, re
          files = sorted(glob.glob('output/daily/*.parquet'))
          if files:
              dates = [re.search(r'(\d{4}-\d{2}-\d{2})', f).group(1) for f in files]
              print(dates[-1])
          else:
              print('none')
          ")
            echo "Last data date: $LAST_DATE"
          else
            echo "[INIT] No cached data — running first-time backfill"
            LAST_DATE="none"
          fi

          if [ "$LAST_DATE" = "none" ]; then
            echo "[BACKFILL] Fetching all stocks (this will take 30-60 min)..."
            python scripts/init_backfill.py --start 2026-01-01
            echo "[BACKFILL] Done. Now running detection..."
            python scripts/daily_update.py --no-update --limit "${STOCK_LIMIT}"
          elif [ "$SKIP_FETCH" = "true" ]; then
            echo "[ANALYZE] Skipping fetch, analyzing from cache..."
            python scripts/daily_update.py --no-update --limit "${STOCK_LIMIT}"
          else
            echo "[UPDATE] Incremental update + analysis..."
            python scripts/daily_update.py --limit "${STOCK_LIMIT}"
          fi

      - name: Send to Feishu
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          echo "[NOTIFY] Sending results to Feishu..."
          python scripts/notify_feishu.py

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommendations
          path: |
            output/results/recommendations_*.csv
            output/reports/*.html
          retention-days: 30
