name: Daily Adam's Theory Update

on:
  schedule:
    # 16:00 CST = 08:00 UTC (A-share market closes at 15:00, allow 1h for data propagation)
    - cron: '0 8 * * 1-5'   # Every weekday at 16:00 Beijing time
  workflow_dispatch:          # Manual trigger
    inputs:
      limit:
        description: 'Max stocks to analyze for signals'
        required: false
        default: '500'
        type: string
      skip_fetch:
        description: 'Skip data fetch, analyze from cache only'
        required: false
        default: true
        type: boolean

jobs:
  update-and-recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Create .env configuration
        env:
          STOCK_LIMIT: ${{ github.event.inputs.limit || '500' }}
        run: |
          cat > .env << ENDENV
          RESULTS_DIR=output/results
          REPORTS_DIR=output/reports
          DAILY_DIR=output/daily
          ALL_STOCKS_PATH=output/all_stocks.parquet
          STOCK_LIST_PATH=output/stock_list.csv

          DATA_SOURCE_ORDER=["tencent","baostock"]
          DATA_SOURCE_STRATEGY=priority

          FETCH_DELAY_SECONDS=1.0
          FETCH_MAX_WORKERS=1
          FETCH_RETRY_COUNT=3

          LOOKBACK_BARS=20
          BREAKOUT_LOOKBACK=20
          BREAKOUT_THRESHOLD_PCT=0.98
          TREND_CHANGE_LOOKBACK=40
          TREND_CHANGE_RECENT=15
          RANGE_EXPANSION_MULTIPLE=1.5
          GAP_MIN_PCT=0.5

          MIN_PRICE=3.0
          MAX_STOCKS_TO_ANALYZE=${STOCK_LIMIT}

          MAX_RISK_SCORE=7.0
          TOP_N_RECOMMENDATIONS=20

          FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
          ENDENV

      - name: Restore stock data cache
        id: cache-stock
        uses: actions/cache@v4
        with:
          path: output/daily/
          key: stock-data-v2-${{ runner.os }}-${{ hashFiles('output/stock_list.csv') }}
          restore-keys: |
            stock-data-v2-${{ runner.os }}-

      - name: Run analysis
        env:
          SKIP_FETCH: ${{ github.event.inputs.skip_fetch || 'true' }}
          STOCK_LIMIT: ${{ github.event.inputs.limit || '500' }}
        run: |
          # Check if we have existing data
          HAS_DATA=false
          if [ -d "output/daily" ] && [ "$(ls -A output/daily/*.parquet 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "[OK] Found parquet data in output/daily/"
            HAS_DATA=true
          fi

          if [ "$HAS_DATA" = "false" ]; then
            echo "[WARN] No cached data found."
            echo "[INFO] GitHub runners cannot access China stock APIs due to IP restrictions."
            echo "[INFO] Please run data backfill locally: python scripts/init_backfill.py"
            echo "[INFO] Then re-run this workflow to use the cached data."
            exit 0
          fi

          echo "[ANALYZE] Running Adam's Theory detection on cached data..."
          python scripts/daily_update.py --no-update --limit "${STOCK_LIMIT}"

      - name: Send to Feishu
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          echo "[NOTIFY] Sending results to Feishu..."
          python scripts/notify_feishu.py

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommendations
          path: |
            output/results/recommendations_*.csv
            output/reports/*.html
          retention-days: 30
